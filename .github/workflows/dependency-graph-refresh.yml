name: Dependency Graph Refresh

on:
  # Reusable entrypoint for repository workflows. Callers provide the scan path
  # and artifact preferences; this workflow owns SBOM generation, dependency
  # graph refresh, and result publishing.
  workflow_call:
    inputs:
      # Scan target selection. The path can be the repository root or any
      # subdirectory that should be inspected for ecosystem manifests.
      source_path: &source_path_input
        description: Path to scan for filesystem SBOM generation
        required: false
        default: .
        type: string
      graph_refresh_args: &graph_refresh_args_input
        description: Additional detector arguments for dependency graph refresh
        required: false
        default: ''
        type: string
      # Tooling. Pin Syft so generated SBOM content is deterministic across
      # workflow runs and across repositories that call this reusable workflow.
      syft_version: &syft_version_input
        description: Pinned Syft version for deterministic behavior
        required: false
        default: v1.45.0
        type: string

      # Artifact publishing. Code scanning upload always runs; this flag only
      # controls whether generated SBOM files are retained as workflow artifacts.
      upload_artifacts: &upload_artifacts_input
        description: Upload generated SBOMs as workflow artifacts
        required: false
        default: true
        type: boolean
      artifact_prefix: &artifact_prefix_input
        description: Artifact prefix
        required: false
        default: sbom
        type: string
      artifact_retention_days: &artifact_retention_days_input
        description: Artifact retention period in days
        required: false
        default: 30
        type: number

  # Optional manual trigger for testing this shared workflow directly without a
  # separate caller workflow.
  workflow_dispatch:
    inputs:
      source_path: *source_path_input
      graph_refresh_args: *graph_refresh_args_input
      syft_version: *syft_version_input
      upload_artifacts: *upload_artifacts_input
      artifact_prefix: *artifact_prefix_input
      artifact_retention_days: *artifact_retention_days_input

permissions:
  # Required for checkout and dependency graph snapshot submission.
  contents: write

jobs:
  # Prepare runtime configuration and scan targets before the matrix job starts.
  # GitHub Actions requires matrix values to be known before job fan-out, so
  # detection happens once here and generate-sbom consumes the resulting JSON.
  prepare-matrix:
    name: Prepare SBOM Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      matrix_count: ${{ steps.matrix.outputs.matrix_count }}
      graph_refresh_args: ${{ steps.cfg.outputs.graph_refresh_args }}
      syft_version: ${{ steps.cfg.outputs.syft_version }}
      upload_artifacts: ${{ steps.cfg.outputs.upload_artifacts }}
      artifact_prefix: ${{ steps.cfg.outputs.artifact_prefix }}
      artifact_retention_days: ${{ steps.cfg.outputs.artifact_retention_days }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Use the default token from the current workflow run.
          token: ${{ github.token }}
          fetch-depth: 0

      - name: Resolve inputs once
        id: cfg
        shell: bash
        run: |
          set -euo pipefail
          # Copy inputs into job outputs so matrix children read one normalized
          # value set instead of re-evaluating workflow inputs in every job.
          echo "source_path=${{ inputs.source_path }}" >> "$GITHUB_OUTPUT"
          echo "graph_refresh_args=${{ inputs.graph_refresh_args }}" >> "$GITHUB_OUTPUT"
          echo "syft_version=${{ inputs.syft_version }}" >> "$GITHUB_OUTPUT"
          echo "upload_artifacts=${{ inputs.upload_artifacts }}" >> "$GITHUB_OUTPUT"
          echo "artifact_prefix=${{ inputs.artifact_prefix }}" >> "$GITHUB_OUTPUT"
          echo "artifact_retention_days=${{ inputs.artifact_retention_days }}" >> "$GITHUB_OUTPUT"

      - name: Build scan matrix
        id: matrix
        uses: tsumrad/shared-gha-tools/.github/actions/build-ecosystem-matrix@sbom-generation
        with:
          # Detect ecosystem manifests, skip generated/vendor folders, and emit
          # one matrix entry for each filesystem SBOM target.
          mode: sbom
          path: ${{ steps.cfg.outputs.source_path }}

      - name: Summarize scan matrix
        shell: bash
        env:
          DETECTED: ${{ steps.matrix.outputs.detected }}
          TARGETS: ${{ steps.matrix.outputs.targets }}
          MATRIX: ${{ steps.matrix.outputs.matrix }}
        run: |
          set -euo pipefail
          # Add a human-readable summary next to the machine-readable matrix
          # outputs so maintainers can quickly see what will be scanned.
          echo "### Scan Matrix" >> "$GITHUB_STEP_SUMMARY"
          echo "Entries: ${{ steps.matrix.outputs.matrix_count }}" >> "$GITHUB_STEP_SUMMARY"
          detected_summary="$(jq -r 'join(", ")' <<< "$DETECTED")"
          targets_summary="$(jq -r 'join(", ")' <<< "$TARGETS")"
          echo "Detected ecosystems: $detected_summary" >> "$GITHUB_STEP_SUMMARY"
          echo "Selected targets: $targets_summary" >> "$GITHUB_STEP_SUMMARY"
          echo "Matrix entries:"
          jq -c '.include[]' <<< "$MATRIX"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Matrix entries:" >> "$GITHUB_STEP_SUMMARY"
          jq -r '.include[] | "- `scan_label=\(.scan_label)`, `source=\(.source)`, `output_prefix=\(.output_prefix)`, `ecosystems=\(.ecosystems | join(","))`"' <<< "$MATRIX" >> "$GITHUB_STEP_SUMMARY"

  generate-sbom:
    name: Generate SBOM (${{ matrix.scan_label }})
    runs-on: ubuntu-latest
    needs: prepare-matrix
    # Skip the matrix job entirely when preparation produced no targets.
    if: needs.prepare-matrix.outputs.matrix_count != '0'
    strategy:
      # Continue other scan targets even if one ecosystem directory fails.
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare-matrix.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Use the same checkout behavior as preparation so generated output
          # paths and source paths refer to the same repository contents.
          token: ${{ github.token }}
          fetch-depth: 0

      - name: Log SBOM matrix entry
        shell: bash
        run: |
          set -euo pipefail
          echo 'SBOM matrix entry:'
          jq -n \
            --arg scan_kind '${{ matrix.scan_kind }}' \
            --arg scan_label '${{ matrix.scan_label }}' \
            --arg source '${{ matrix.source }}' \
            --arg output_prefix '${{ matrix.output_prefix }}' \
            --argjson ecosystems '${{ toJson(matrix.ecosystems) }}' \
            '{scan_kind:$scan_kind, scan_label:$scan_label, source:$source, output_prefix:$output_prefix, ecosystems:$ecosystems}'

      - name: Run SBOM core action
        uses: tsumrad/shared-gha-tools/.github/actions/sbom-generation@sbom-generation
        with:
          # Generate the CycloneDX inventory used by security/compliance tooling.
          source: ${{ matrix.source }}
          output_prefix: ${{ matrix.output_prefix }}
          syft_version: ${{ needs.prepare-matrix.outputs.syft_version }}
          scan_label: ${{ matrix.scan_label }}
          ecosystems: ${{ toJson(matrix.ecosystems) }}

      - name: Verify SBOM output
        shell: bash
        run: |
          set -euo pipefail
          # Fail before publishing if the generator
          # did not create both primary SBOM formats expected by consumers.
          test -f "${{ matrix.output_prefix }}.cyclonedx.json"
          test -f "${{ matrix.output_prefix }}.spdx.json"

      - name: Upload SBOM artifacts
        if: needs.prepare-matrix.outputs.upload_artifacts == 'true'
        uses: actions/upload-artifact@v4
        with:
          # Include run id and scan label to avoid artifact name collisions
          # across matrix entries and repeated workflow runs.
          name: ${{ needs.prepare-matrix.outputs.artifact_prefix }}-${{ github.run_id }}-${{ matrix.scan_label }}
          path: |
            ${{ matrix.output_prefix }}.cyclonedx.json
            ${{ matrix.output_prefix }}.spdx.json
          if-no-files-found: error
          retention-days: ${{ needs.prepare-matrix.outputs.artifact_retention_days }}

  refresh-dependency-graph:
    name: Refresh Dependency Graph (${{ matrix.scan_label }})
    runs-on: ubuntu-latest
    needs:
      - prepare-matrix
      - generate-sbom
    if: needs.prepare-matrix.outputs.matrix_count != '0'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare-matrix.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
          fetch-depth: 0

      - name: Log dependency graph matrix entry
        shell: bash
        run: |
          set -euo pipefail
          echo 'Dependency graph matrix entry:'
          jq -n \
            --arg scan_kind '${{ matrix.scan_kind }}' \
            --arg scan_label '${{ matrix.scan_label }}' \
            --arg source '${{ matrix.source }}' \
            --arg output_prefix '${{ matrix.output_prefix }}' \
            --argjson ecosystems '${{ toJson(matrix.ecosystems) }}' \
            '{scan_kind:$scan_kind, scan_label:$scan_label, source:$source, output_prefix:$output_prefix, ecosystems:$ecosystems}'

      - name: Refresh GitHub Dependency Graph
        uses: tsumrad/shared-gha-tools/.github/actions/refresh-dependency-graph@sbom-generation
        with:
          scan_label: ${{ matrix.scan_label }}
          source_dir: ${{ matrix.source }}
          detector_args: ${{ needs.prepare-matrix.outputs.graph_refresh_args }}
